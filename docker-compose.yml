services:
  database:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: netflix_clone_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: netflix_clone

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netflix_clone_api
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://database:27017/netflix_clone
      CLIENT_URL: http://localhost:5173
      JWT_SECRET: local-development-secret-change-before-production
      JWT_EXPIRES_IN: 7d
      PORT: 5000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: netflix_clone_web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  mongo_data:
